[functions]
  directory = "netlify/functions"

# Friendly URL for the Anthropic proxy function (used by the AI tutor and Life games).
[[redirects]]
  from = "/api/claude"
  to = "/.netlify/functions/claude"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"
